  <style>
    :root {

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 100; }

    .logo-badge { background: var(--accent); color: var(--accent-text); font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: .04em; padding: 4px 8px; border-radius: 5px; }

    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hero { background: linear-gradient(135deg,#0f0800 0%,#0a0c10 60%); border-bottom: 1px solid #f9762a44; padding: 28px 20px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(249,118,42,.12) 0%, transparent 70%); pointer-events: none; }
    .hero-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 20px; position: relative; z-index: 1; }
    .hero-logo { height: 52px; width: auto; max-width: 90px; object-fit: contain; filter: drop-shadow(0 2px 12px rgba(249,118,42,.5)); flex-shrink: 0; }

    main { max-width: 960px; margin: 0 auto; padding: 26px 20px 60px; }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.error { background: #ef4444; }
    .events-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 560px) { .events-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 860px) { .events-grid { grid-template-columns: 1fr 1fr 1fr; } }
    .event-card { display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); text-decoration: none; color: inherit; transition: border-color .18s, background .18s, transform .14s; position: relative; overflow: hidden; }
    .event-card:hover { border-color: rgba(249,118,42,.45); background: #1c2130; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(249,118,42,.15); }
    .event-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background .18s; border-radius: 10px 0 0 10px; }
    .event-card:hover::after { background: var(--accent); }
    .match-thumb { width: 100%; aspect-ratio: 16/9; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; position: relative; overflow: hidden; background: linear-gradient(160deg,#0d1118 0%,#141926 55%,#0d1118 100%); }
    .match-thumb::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,.018) 28px,rgba(255,255,255,.018) 29px); pointer-events: none; }
    .match-thumb::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 50%,rgba(249,118,42,.06) 0%,transparent 70%); pointer-events: none; }
    .mt-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; z-index: 1; min-width: 0; }
    .mt-logo-wrap { width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; }
    .mt-logo { max-width: 54px; max-height: 54px; width: auto; height: auto; object-fit: contain; filter: drop-shadow(0 2px 10px rgba(0,0,0,.6)); }
    .mt-logo-placeholder { width: 50px; height: 50px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

    .watch-btn-static { opacity: 1 !important; pointer-events: auto !important; transform: translateX(-50%) !important; }
    .watch-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: var(--accent-text); font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; padding: 7px 16px; border-radius: 20px; text-decoration: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(249,118,42,.35); transition: background .15s, box-shadow .15s, transform .15s; }
    .watch-btn:hover { box-shadow: 0 6px 20px rgba(249,118,42,.55); transform: scale(1.04); }
    .play-icon { width: 14px; height: 14px; background: rgba(0,0,0,.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; flex-shrink: 0; }
    .card-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 38px; position: relative; }
    .thumb-loading { width: 100%; aspect-ratio: 16/9; background: linear-gradient(90deg,var(--card) 25%,#1e2333 50%,var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-bottom: 1px solid var(--border); }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .card-body { display: flex; align-items: center; gap: 10px; padding: 11px 13px; flex: 1; }
    .sport-icon { width: 30px; height: 30px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-size: 12.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .event-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .event-label { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; background: rgba(249,118,42,.15); color: var(--accent); border: 1px solid rgba(249,118,42,.3); }
    .event-date { font-size: 11px; color: var(--muted); }
    .event-arrow { color: var(--border); font-size: 16px; flex-shrink: 0; transition: color .15s, transform .15s; }
    .event-card:hover .event-arrow { color: var(--accent); transform: translateX(2px); }
    .inline-score { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; letter-spacing: 2px; flex-shrink: 0; }
    .inline-score.live { border-color: rgba(34,197,94,.4); color: #22c55e; }
    .skeleton { background: linear-gradient(90deg,var(--card) 25%,#1e2333 50%,var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); height: 200px; border: 1px solid var(--border); margin-bottom: 8px; }
    #no-results { display: none; text-align: center; padding: 60px 20px; color: var(--muted); }
    #no-results .icon { font-size: 40px; margin-bottom: 12px; }
    footer { border-top: 1px solid var(--border); padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }

      <a class="back-link" href="index.html">← All Events</a>

    <img class="hero-logo" src="https://upload.wikimedia.org/wikipedia/en/thumb/0/03/National_Basketball_Association_logo.svg/800px-National_Basketball_Association_logo.svg.png" alt="NBA" onerror="this.style.display='none'">
    <div class="hero-text">
      <h1>NBA</h1>
      <p>National Basketball Association</p>
    </div>
    <div class="hero-live-pill">
      <div class="hero-count" id="hero-count">—</div>
      <div class="hero-count-label">Events Today</div>

</div>

<main>
  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Fetching NBA events…</span>
  </div>
  <div class="events-grid" id="grid-container">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

    <div class="icon">🏀</div>
    No NBA events today. Check back soon!
  </div>
</main>

<footer>
  Live feed from
  <a href="https://sports803livestream.blogspot.com" target="_blank">sports803livestream.blogspot.com</a>
  &nbsp;·&nbsp; NBA only · auto-refreshes every 5 min
</footer>

<script>
const BLOG_URL  = 'https://sports803livestream.blogspot.com';
const MAX_POSTS = 50;
const EXPIRE_MS = 24 * 60 * 60 * 1000;
const SPORT_LABELS = ["nba","basketball"];

const ESPN_MAP = {
  'nba':'basketball/nba',
  'champions league':'soccer/uefa.champions','ucl':'soccer/uefa.champions',
  'premier league':'soccer/eng.1','epl':'soccer/eng.1',
  'la liga':'soccer/esp.1','laliga':'soccer/esp.1',
  'serie a':'soccer/ita.1','bundesliga':'soccer/ger.1',
  'ligue 1':'soccer/fra.1','f1':'racing/f1',
};

const espnCache = {};
const logoCache = {};
let allEvents = [];
let renderedEvents = [];

function matchesLabel(label) {
  if (!label) return false;
  const k = label.toLowerCase();
  return SPORT_LABELS.some(s => k.includes(s) || s.includes(k));
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'Just posted';
  if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function loadFeed() {
  setStatus('','Fetching NBA events…');
  const old = document.getElementById('_bfeed');
  if (old) old.remove();
  const s = document.createElement('script');
  s.id = '_bfeed';
  s.src = `${BLOG_URL}/feeds/posts/default?alt=json-in-script&max-results=${MAX_POSTS}&orderby=published&callback=_onFeed&t=${Date.now()}`;
  s.onerror = () => { setStatus('error','Could not load feed.'); clearSkeletons(); };
  document.head.appendChild(s);
  setTimeout(() => { if (!allEvents.length) { setStatus('error','Feed timed out.'); clearSkeletons(); } }, 12000);
}

window._onFeed = function(json) {
  const entries = json.feed.entry || [];
  const now = Date.now();
  allEvents = entries.map(e => {
    const link  = (e.link||[]).find(l => l.rel==='alternate');
    const label = (e.category||[])[0]?.term || null;
    return { title: e.title?.$t||'Untitled', url: link?.href||'#', date: e.published?.$t||null, label };
  }).filter(e => {
    if (!e.date) return false;
    if (!matchesLabel(e.label)) return false;
    const age = now - new Date(e.date).getTime();
    return age >= 0 && age <= EXPIRE_MS;
  });
  const shown = allEvents.length;
  document.getElementById('hero-count').textContent = shown;
  setStatus(shown?'live':'', shown ? `${shown} event${shown!==1?'s':''} today · auto-refreshes every 5 min` : 'No NBA posts in the last 24 hours');
  render();
};

function render() {
  const grid = document.getElementById('grid-container');
  const noResults = document.getElementById('no-results');
  clearSkeletons();
  if (!allEvents.length) { grid.innerHTML=''; renderedEvents=[]; noResults.style.display='block'; return; }
  noResults.style.display = 'none';
  renderedEvents = [...allEvents];
  grid.innerHTML = allEvents.map((e, idx) => `
    <a class="event-card" href="${e.url}" target="_blank" rel="noopener" data-idx="${idx}">
      <div class="thumb-loading" data-thumb-idx="${idx}"></div>
      <div class="card-body">
        <div class="sport-icon">🏀</div>
        <div class="event-info">
          <div class="event-title" title="${e.title.replace(/"/g,'&quot;')}">${e.title}</div>
          <div class="event-meta">
            ${e.label?`<span class="event-label">${e.label}</span>`:''}
            <span class="event-date">${timeAgo(e.date)}</span>
          </div>
        </div>
        <span class="event-arrow">›</span>
      </div>
    </a>`).join('');
  enrichCards();
}

async function enrichCards() {
  const labelsPresent = [...new Set(renderedEvents.map(e=>e.label).filter(Boolean))];
  await Promise.all(labelsPresent.map(label => fetchESPNScoreboard(label)));
  const thumbEls = document.querySelectorAll('[data-thumb-idx]');
  for (const el of thumbEls) {
    const idx = parseInt(el.dataset.thumbIdx);
    const event = renderedEvents[idx];
    if (!event) continue;
    const teams = parseMatchTeams(event.title);
    if (!teams) {
      el.outerHTML = `<div class="card-thumb-placeholder" style="position:relative;">🏀<div class="watch-btn-wrap watch-btn-static"><a class="watch-btn" href="${event.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="play-icon">▶</span> Watch Live Stream</a></div></div>`;
      continue;
    }
    const espnEvents = getESPNCached(event.label);
    const scoreData  = findScore(teams.home, teams.away, espnEvents);
    let homeLogo = scoreData?.homeLogo||null;
    let awayLogo = scoreData?.awayLogo||null;
    const [hl,al] = await Promise.all([
      homeLogo?Promise.resolve(homeLogo):fetchTeamLogo(teams.home),
      awayLogo?Promise.resolve(awayLogo):fetchTeamLogo(teams.away),
    ]);
    homeLogo=hl; awayLogo=al;
    let badgeHtml = scoreData
      ? `<span class="mt-badge ${scoreData.state==='in'?'live':scoreData.state==='post'?'ft':'pre'}">${scoreData.state==='in'?'🔴 '+(scoreData.status||'LIVE'):scoreData.state==='post'?'FT':scoreData.status||'UPCOMING'}</span>`
      : `<span class="mt-badge pre">📺 WATCH</span>`;
    const showScore = scoreData&&(scoreData.state==='in'||scoreData.state==='post');
    const centerHtml = showScore
      ? `<div class="mt-score">${scoreData.homeScore}<span style="color:#2a3045;font-size:20px;margin:0 2px">–</span>${scoreData.awayScore}</div>`
      : `<div class="mt-vs">VS</div>`;
    const logoHtml = (logo,name) => logo
      ? `<img class="mt-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.outerHTML='<div class=mt-logo-placeholder>🏀</div>'">`
      : `<div class="mt-logo-placeholder">🏀</div>`;
    const placeholder = document.querySelector(`[data-thumb-idx="${idx}"]`);
    if (placeholder) {
      const tmp = document.createElement('div');
      tmp.innerHTML = `<div class="match-thumb" style="position:relative;"><div class="mt-team"><div class="mt-logo-wrap">${logoHtml(homeLogo,teams.home)}</div><div class="mt-name">${teams.home}</div></div><div class="mt-center">${centerHtml}${badgeHtml}</div><div class="mt-team"><div class="mt-logo-wrap">${logoHtml(awayLogo,teams.away)}</div><div class="mt-name">${teams.away}</div></div><div class="watch-btn-wrap"><a class="watch-btn" href="${event.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="play-icon">▶</span> Watch Live Stream</a></div></div>`;
      placeholder.replaceWith(tmp.firstElementChild);
    }
    if (scoreData&&showScore) {
      const card = document.querySelector(`.event-card[data-idx="${idx}"]`);
      if (card&&!card.querySelector('.inline-score')) {
        const arrow = card.querySelector('.event-arrow');
        if (arrow) { const chip=document.createElement('span'); chip.className='inline-score'+(scoreData.state==='in'?' live':''); chip.textContent=`${scoreData.homeScore}–${scoreData.awayScore}`; arrow.before(chip); }
      }
    }
  }
}

async function fetchESPNScoreboard(label) {
  const path = getESPNPath(label);
  if (!path||espnCache[path]!==undefined) return;
  try { const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard`,{signal:AbortSignal.timeout(6000)}); espnCache[path]=r.ok?(await r.json()).events||[]:[];} catch{espnCache[path]=[];}
}
function getESPNPath(label) {
  if (!label) return null;
  const k=label.toLowerCase();
  for (const [key,path] of Object.entries(ESPN_MAP)) { if (k.includes(key)) return path; }
  return null;
}
function getESPNCached(label) { const p=getESPNPath(label); return p?(espnCache[p]||[]):[];}
function parseMatchTeams(title) {
  const m=title.match(/^(?:watch\s+)?(.+?)\s+(?:vs?\.?|[-–])\s+(.+?)(?:\s+(?:live|stream|full|hd|free).*)?\s*$/i);
  if (!m) return null;
  const home=m[1].trim().replace(/^watch\s+/i,''), away=m[2].trim();
  if (home.length<2||away.length<2) return null;
  return {home,away};
}
function normTeam(s){return s.toLowerCase().replace(/(fc|sc|ac|cf|afc|bfc|bsc|rc|cd|ud)/gi,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
function fuzzyTeamMatch(a,b){const na=normTeam(a),nb=normTeam(b);if(na===nb||na.includes(nb)||nb.includes(na))return true;const wa=na.split(' ')[0],wb=nb.split(' ')[0];return wa.length>3&&wa===wb;}
function findScore(homeTeam,awayTeam,espnEvents){
  for(const ev of espnEvents){
    const comps=ev.competitions?.[0]?.competitors||[];
    if(comps.length<2)continue;
    const hC=comps.find(c=>c.homeAway==='home')||comps[0],aC=comps.find(c=>c.homeAway==='away')||comps[1];
    const hn=hC.team?.displayName||'',an=aC.team?.displayName||'';
    if(!(fuzzyTeamMatch(hn,homeTeam)||fuzzyTeamMatch(an,homeTeam)))continue;
    if(!(fuzzyTeamMatch(hn,awayTeam)||fuzzyTeamMatch(an,awayTeam)))continue;
    const hA=fuzzyTeamMatch(hn,homeTeam)?hC:aC,aA=fuzzyTeamMatch(an,awayTeam)?aC:hC;
    const status=ev.status?.type,state=status?.state||'pre';
    return{homeScore:hA.score??'-',awayScore:aA.score??'-',status:status?.shortDetail||(state==='in'?'LIVE':state==='post'?'FT':''),state,homeLogo:hA.team?.logo||null,awayLogo:aA.team?.logo||null};
  }
  return null;
}
async function fetchTeamLogo(teamName){
  const key=teamName.toLowerCase().trim();
  if(logoCache[key]!==undefined)return logoCache[key];
  logoCache[key]=null;
  try{const r=await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${encodeURIComponent(teamName)}`,{signal:AbortSignal.timeout(5000)});const d=await r.json();logoCache[key]=d.teams?.[0]?.strTeamBadge||d.teams?.[0]?.strTeamLogo||null;}catch{logoCache[key]=null;}
  return logoCache[key];
}
function setStatus(state,text){document.getElementById('status-dot').className='status-dot'+(state?' '+state:'');document.getElementById('status-text').textContent=text;}
function clearSkeletons(){const c=document.getElementById('grid-container');if(c.querySelector('.skeleton'))c.innerHTML='';}

document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
loadFeed();
setInterval(loadFeed,5*60*1000);
